<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra Historia ❤️</title>

<style>
body{
background:#ffe6f0;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
color:#ff4d88;
}

.carta{
background:white;
padding:30px;
border-radius:20px;
max-width:600px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
font-size:18px;
border:none;
background:#ff4d88;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

.oculto{
display:none;
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<h1>Para ti ❤️</h1>

<div class="carta">

<p>
Esta pequeña página es solo para recordarte  
lo especial que eres para mí.
</p>

<button onclick="mostrar()">Abrir carta</button>

<p id="mensaje" class="oculto">
Desde que llegaste a mi vida todo se siente diferente.  
Aunque estemos lejos, cada día pienso en ti.  
Gracias por estos meses tan lindos.  

Te amo muchisisimo ❤️
</p>

</div>

<script>
function mostrar(){
document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
